name: Release Python

on:
  push:
    tags:
      - "vPY-*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: packages/python
        run: uv sync

      - name: Run tests
        working-directory: packages/python
        run: uv run pytest --tb=short

      - name: Type check
        working-directory: packages/python
        run: uv run mypy --strict src/

      - name: Build mcpspec-dev
        working-directory: packages/python
        run: uv build

      - name: Build mcpspec wrapper
        working-directory: packages/python-wrapper
        run: uv build

      - name: Publish mcpspec-dev to PyPI
        working-directory: packages/python
        run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}

      - name: Publish mcpspec to PyPI
        working-directory: packages/python-wrapper
        run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
