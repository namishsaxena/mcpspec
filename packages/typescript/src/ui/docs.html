<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>__TITLE__ — mcpspec</title>
  <style>:root, [data-theme="dark"] {
  --bg-primary: #0d1117;
  --bg-secondary: #161b22;
  --bg-tertiary: #21262d;
  --border: #30363d;
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --text-link: #58a6ff;
  --accent-green: #3fb950;
  --accent-red: #f85149;
  --accent-yellow: #d29922;
  --accent-purple: #bc8cff;
  --badge-readonly-bg: rgba(63, 185, 80, 0.15);
  --badge-destructive-bg: rgba(248, 81, 73, 0.15);
  --badge-idempotent-bg: rgba(210, 153, 34, 0.15);
  --badge-openworld-bg: rgba(188, 140, 255, 0.15);
  --health-bg: rgba(63, 185, 80, 0.1);
  --card-shadow: none;
  --font-mono: "SF Mono", "Fira Code", "Fira Mono", Menlo, Consolas, monospace;
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
}

[data-theme="light"] {
  --bg-primary: #ffffff;
  --bg-secondary: #f6f8fa;
  --bg-tertiary: #eef1f6;
  --border: #d1d9e0;
  --text-primary: #1b1f24;
  --text-secondary: #525964;
  --text-link: #0969da;
  --accent-green: #1a7f37;
  --accent-red: #d1242f;
  --accent-yellow: #9a6700;
  --accent-purple: #7c3aed;
  --badge-readonly-bg: rgba(26, 127, 55, 0.12);
  --badge-destructive-bg: rgba(209, 36, 47, 0.12);
  --badge-idempotent-bg: rgba(154, 103, 0, 0.12);
  --badge-openworld-bg: rgba(124, 58, 237, 0.12);
  --health-bg: rgba(26, 127, 55, 0.1);
  --card-shadow: 0 1px 3px rgba(27, 31, 35, 0.06), 0 1px 2px rgba(27, 31, 35, 0.04);
}

[data-theme="contrast"] {
  --bg-primary: #000000;
  --bg-secondary: #111111;
  --bg-tertiary: #222222;
  --border: #666666;
  --text-primary: #ffffff;
  --text-secondary: #d4d4d4;
  --text-link: #6cb6ff;
  --accent-green: #56d364;
  --accent-red: #ff7b72;
  --accent-yellow: #e3b341;
  --accent-purple: #d2a8ff;
  --badge-readonly-bg: rgba(86, 211, 100, 0.2);
  --badge-destructive-bg: rgba(255, 123, 114, 0.2);
  --badge-idempotent-bg: rgba(227, 179, 65, 0.2);
  --badge-openworld-bg: rgba(210, 168, 255, 0.2);
  --health-bg: rgba(86, 211, 100, 0.15);
  --card-shadow: none;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

/* Accessibility */
:focus-visible {
  outline: 2px solid var(--text-link);
  outline-offset: 2px;
  border-radius: 2px;
}
:focus:not(:focus-visible) { outline: none; }

.skip-link {
  position: absolute;
  top: -40px;
  left: 16px;
  background: var(--text-link);
  color: #fff;
  padding: 8px 16px;
  border-radius: 4px;
  z-index: 100;
  font-size: 13px;
  text-decoration: none;
  transition: top 0.15s;
}
.skip-link:focus { top: 8px; }

body {
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.6;
}

.container { max-width: 960px; margin: 0 auto; padding: 24px 16px; }

/* Header */
.header {
  border-bottom: 1px solid var(--border);
  padding-bottom: 20px;
  margin-bottom: 24px;
}
.header h1 {
  font-size: 24px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.header .version {
  font-size: 14px;
  color: var(--text-secondary);
  font-weight: 400;
}
.header .description {
  color: var(--text-secondary);
  margin-top: 8px;
  white-space: pre-wrap;
}
.health-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  color: var(--accent-green);
  background: var(--health-bg);
  padding: 2px 8px;
  border-radius: 12px;
}
.health-badge::before { content: "\25CF"; }

.transport-info {
  display: flex;
  gap: 12px;
  margin-top: 8px;
  font-size: 13px;
  color: var(--text-secondary);
}
.transport-info .tag {
  background: var(--bg-tertiary);
  padding: 2px 8px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 12px;
}

.meta-links {
  display: flex;
  gap: 16px;
  margin-top: 8px;
  font-size: 13px;
}
.meta-links a {
  color: var(--text-link);
  text-decoration: none;
}
.meta-links a:hover { text-decoration: underline; }

/* Section tabs */
.section-tabs {
  display: flex;
  gap: 24px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}
.section-tab {
  padding: 8px 0;
  cursor: pointer;
  color: var(--text-secondary);
  border-bottom: 2px solid transparent;
  font-size: 14px;
  font-weight: 500;
  user-select: none;
}
.section-tab:hover { color: var(--text-primary); }
.section-tab.active {
  color: var(--text-primary);
  border-bottom-color: var(--text-link);
}
.section-tab .count {
  font-size: 12px;
  margin-left: 4px;
  color: var(--text-secondary);
}

/* Tool groups */
.tool-group { margin-bottom: 16px; }
.tool-group-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  cursor: pointer;
  background: var(--bg-secondary);
  border-radius: 6px;
  font-weight: 500;
  user-select: none;
}
.tool-group-header:hover { background: var(--bg-tertiary); }
.tool-group-header .chevron {
  transition: transform 0.2s;
  display: inline-flex;
  align-items: center;
}
.tool-group-header.open .chevron { transform: rotate(90deg); }
.tool-group-header .group-count {
  font-size: 12px;
  color: var(--text-secondary);
  margin-left: auto;
}
.tool-group-body {
  display: none;
  padding: 8px 0 0 0;
}
.tool-group-body.open { display: block; }

/* Tool cards */
.tool-card {
  border: 1px solid var(--border);
  border-radius: 6px;
  margin-bottom: 8px;
  background: var(--bg-secondary);
  box-shadow: var(--card-shadow);
  overflow: hidden;
}
.tool-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  cursor: pointer;
  gap: 12px;
}
.tool-card-header:hover { background: var(--bg-tertiary); }
.tool-name {
  font-family: var(--font-mono);
  font-weight: 600;
  font-size: 13px;
  color: var(--text-link);
}
.tool-title {
  font-size: 13px;
  color: var(--text-secondary);
  margin-left: 8px;
}
.tool-card-left {
  display: flex;
  align-items: center;
  min-width: 0;
  flex-shrink: 1;
}

/* Annotation badges */
.badges { display: flex; gap: 4px; flex-shrink: 0; }
.badge {
  font-size: 11px;
  padding: 1px 6px;
  border-radius: 3px;
  font-family: var(--font-mono);
  white-space: nowrap;
}
.badge-readonly { background: var(--badge-readonly-bg); color: var(--accent-green); }
.badge-destructive { background: var(--badge-destructive-bg); color: var(--accent-red); }
.badge-idempotent { background: var(--badge-idempotent-bg); color: var(--accent-yellow); }
.badge-openworld { background: var(--badge-openworld-bg); color: var(--accent-purple); }

/* Tool detail */
.tool-detail {
  display: none;
  padding: 0 16px 16px;
  border-top: 1px solid var(--border);
}
.tool-detail.open { display: block; }
.tool-description {
  color: var(--text-secondary);
  margin: 12px 0;
  white-space: pre-wrap;
}

/* Parameters table */
.params-section h4 {
  font-size: 12px;
  text-transform: uppercase;
  color: var(--text-secondary);
  margin: 12px 0 8px;
  letter-spacing: 0.5px;
}
.param-row {
  display: grid;
  grid-template-columns: 160px 80px 1fr;
  gap: 8px;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  align-items: baseline;
}
.param-row:last-child { border-bottom: none; }
.param-name {
  font-family: var(--font-mono);
  color: var(--text-primary);
  word-break: break-all;
}
.param-type {
  font-family: var(--font-mono);
  color: var(--accent-purple);
  font-size: 12px;
}
.param-desc { color: var(--text-secondary); }
.param-required {
  color: var(--accent-red);
  font-size: 11px;
  font-weight: 600;
}
.param-constraint {
  color: var(--text-secondary);
  font-size: 11px;
  font-family: var(--font-mono);
}

/* Output schema */
.output-schema-section { margin-top: 12px; }

/* Examples */
.example-section { margin-top: 12px; }
.example-title {
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 4px;
}
.example-desc {
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 4px;
}
.example-code {
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 8px 12px;
  font-family: var(--font-mono);
  font-size: 12px;
  position: relative;
  overflow-x: auto;
  margin-bottom: 8px;
}
.example-code pre {
  margin: 0;
  white-space: pre-wrap;
  word-break: break-word;
}
.copy-btn {
  position: absolute;
  top: 4px;
  right: 4px;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 3px 8px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 11px;
  font-family: var(--font-mono);
  transition: color 0.15s;
}
.copy-btn:hover { color: var(--text-primary); }
.copy-btn svg { flex-shrink: 0; }

/* Resources */
.resource-card {
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px 16px;
  margin-bottom: 8px;
  background: var(--bg-secondary);
  box-shadow: var(--card-shadow);
}
.resource-uri {
  font-family: var(--font-mono);
  color: var(--text-link);
  font-size: 13px;
}
.resource-name {
  color: var(--text-primary);
  font-size: 13px;
  margin-top: 4px;
}
.resource-desc {
  color: var(--text-secondary);
  font-size: 12px;
  margin-top: 2px;
}
.resource-mime {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-secondary);
  background: var(--bg-tertiary);
  padding: 1px 6px;
  border-radius: 3px;
  margin-left: 8px;
}

/* Prompts */
.prompt-card {
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px 16px;
  margin-bottom: 8px;
  background: var(--bg-secondary);
  box-shadow: var(--card-shadow);
}
.prompt-name {
  font-family: var(--font-mono);
  color: var(--text-link);
  font-size: 13px;
}
.prompt-desc {
  color: var(--text-secondary);
  font-size: 12px;
  margin-top: 4px;
}

/* Footer */
.footer {
  border-top: 1px solid var(--border);
  margin-top: 32px;
  padding-top: 16px;
  font-size: 12px;
  color: var(--text-secondary);
  display: flex;
  justify-content: space-between;
}
.footer a {
  color: var(--text-link);
  text-decoration: none;
}
.footer a:hover { text-decoration: underline; }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 32px;
  color: var(--text-secondary);
}

/* Section content — hidden by default, shown by tab JS */
.section-content { display: none; }
.section-content.active { display: block; }

/* Theme toggle */
.theme-toggle {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 6px 12px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 12px;
  font-family: var(--font-sans);
  line-height: 1;
  transition: color 0.15s, background 0.15s;
  flex-shrink: 0;
  white-space: nowrap;
}
.theme-toggle:hover { color: var(--text-primary); background: var(--border); }
.theme-toggle svg { flex-shrink: 0; }

/* Responsive */
@media (max-width: 640px) {
  .param-row { grid-template-columns: 1fr; gap: 2px; }
  .param-type { margin-left: 0; }
  .transport-info { flex-wrap: wrap; }
  .tool-card-header { flex-direction: column; align-items: flex-start; gap: 8px; }
  .badges { flex-wrap: wrap; }
  .header h1 { font-size: 20px; }
  .section-tabs { gap: 16px; }
  .footer { flex-direction: column; gap: 4px; }
}
</style>

  <script>function toggleGroup(el) {
  el.classList.toggle("open");
  var isOpen = el.classList.contains("open");
  el.setAttribute("aria-expanded", String(isOpen));
  var body = el.nextElementSibling;
  if (body) {
    body.classList.toggle("open");
  }
}

function toggleTool(el) {
  var detail = el.nextElementSibling;
  if (detail) {
    detail.classList.toggle("open");
    var isOpen = detail.classList.contains("open");
    el.setAttribute("aria-expanded", String(isOpen));
  }
}

function copyFromCode(btn) {
  var pre = btn.parentElement && btn.parentElement.querySelector("pre");
  if (!pre) return;
  var text = pre.textContent || "";

  function onSuccess() {
    var original = btn.innerHTML;
    btn.innerHTML = iconCheck() + " copied!";
    setTimeout(function () {
      btn.innerHTML = original;
    }, 1500);
  }

  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(onSuccess).catch(function () {
      fallbackCopy(text, onSuccess);
    });
  } else {
    fallbackCopy(text, onSuccess);
  }
}

function fallbackCopy(text, onSuccess) {
  var textarea = document.createElement("textarea");
  textarea.value = text;
  textarea.style.position = "fixed";
  textarea.style.opacity = "0";
  document.body.appendChild(textarea);
  textarea.select();
  try {
    document.execCommand("copy");
    onSuccess();
  } catch (e) {}
  document.body.removeChild(textarea);
}

function switchTab(tabEl) {
  var tabs = document.querySelectorAll(".section-tab");
  var sections = document.querySelectorAll(".section-content");

  tabs.forEach(function (t) {
    t.classList.remove("active");
    t.setAttribute("aria-selected", "false");
  });
  sections.forEach(function (s) {
    s.classList.remove("active");
  });

  tabEl.classList.add("active");
  tabEl.setAttribute("aria-selected", "true");
  var targetId = tabEl.getAttribute("data-section");
  var target = document.getElementById(targetId);
  if (target) {
    target.classList.add("active");
  }
}

var THEME_CYCLE = ["dark", "light", "contrast"];
var THEME_NEXT = { dark: "light", light: "contrast", contrast: "dark" };
var THEME_LABELS = {
  dark: { icon: "sun", text: "Light", aria: "Switch to light theme" },
  light: { icon: "contrast", text: "Contrast", aria: "Switch to high contrast theme" },
  contrast: { icon: "moon", text: "Dark", aria: "Switch to dark theme" }
};

function toggleTheme() {
  var html = document.documentElement;
  var current = html.getAttribute("data-theme") || "dark";
  var next = THEME_NEXT[current] || "dark";
  html.setAttribute("data-theme", next);
  try { localStorage.setItem("mcpspec-theme", next); } catch (e) {}
  updateToggleButton(next);
}

function updateToggleButton(theme) {
  var btn = document.querySelector(".theme-toggle");
  if (!btn) return;
  var label = THEME_LABELS[theme] || THEME_LABELS.dark;
  var icon = label.icon === "sun" ? iconSun() : label.icon === "moon" ? iconMoon() : iconContrast();
  btn.innerHTML = icon + " " + label.text;
  btn.setAttribute("aria-label", label.aria);
}

function initTheme() {
  var saved = null;
  try { saved = localStorage.getItem("mcpspec-theme"); } catch (e) {}
  var theme = saved || "dark";
  document.documentElement.setAttribute("data-theme", theme);
  updateToggleButton(theme);
}

document.addEventListener("DOMContentLoaded", function () {
  initTheme();

  var tabs = document.querySelectorAll(".section-tab");
  tabs.forEach(function (tab) {
    tab.addEventListener("click", function () {
      switchTab(tab);
    });
  });

  // Keyboard support: Enter/Space activates role="button" and role="tab"
  document.addEventListener("keydown", function (e) {
    var role = e.target.getAttribute("role");
    if ((e.key === "Enter" || e.key === " ") && (role === "button" || role === "tab")) {
      e.preventDefault();
      e.target.click();
    }
  });
});
</script>
  <script>
    var spec = __SPEC_DATA__;

    function esc(str) {
      if (str == null) return "";
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function safeUrl(url) {
      if (typeof url !== 'string') return '';
      var trimmed = url.trim().toLowerCase();
      if (trimmed.indexOf('http://') === 0 || trimmed.indexOf('https://') === 0) {
        return url;
      }
      return '';
    }

    function iconSun() {
      return '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true"><circle cx="8" cy="8" r="3"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41"/></svg>';
    }

    function iconMoon() {
      return '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true"><path d="M13.5 8.5a5.5 5.5 0 0 1-7-7 5.5 5.5 0 1 0 7 7z"/></svg>';
    }

    function iconCopy() {
      return '<svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true"><rect x="5" y="5" width="9" height="9" rx="1.5"/><path d="M2 11V2.5A.5.5 0 0 1 2.5 2H11"/></svg>';
    }

    function iconCheck() {
      return '<svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true"><path d="M3 8.5l3.5 3.5 6.5-7"/></svg>';
    }

    function iconChevron() {
      return '<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true"><path d="M4.5 2l4 4-4 4"/></svg>';
    }

    function iconContrast() {
      return '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><circle cx="8" cy="8" r="6"/><path d="M8 2a6 6 0 0 1 0 12z" fill="currentColor"/></svg>';
    }

    function groupTools(tools) {
      var groups = {};
      for (var i = 0; i < tools.length; i++) {
        var g = tools[i].group || "Ungrouped";
        if (!groups[g]) groups[g] = [];
        groups[g].push(tools[i]);
      }
      return groups;
    }

    function renderHeader(spec) {
      var info = spec.info || {};
      var transports = spec.transport || [];

      var html = '<div class="header">';
      html += '<div style="display:flex;justify-content:space-between;align-items:flex-start">';
      html += '<h1>' + esc(info.title || info.name || "MCP Server");
      html += ' <span class="version">v' + esc(info.version || "0.0.0") + '</span>';
      html += ' <span class="health-badge">healthy</span>';
      html += '</h1>';
      html += '<button class="theme-toggle" onclick="toggleTheme()" aria-label="Switch to light theme">' + iconSun() + ' Light</button>';
      html += '</div>';

      if (info.description) {
        html += '<p class="description">' + esc(info.description) + '</p>';
      }

      if (transports.length > 0) {
        html += '<div class="transport-info">';
        for (var i = 0; i < transports.length; i++) {
          var tr = transports[i];
          html += '<span class="tag">' + esc(tr.type) + '</span>';
          if (tr.description) {
            html += '<span>' + esc(tr.description) + '</span>';
          }
          if (tr.auth && tr.auth.type) {
            html += '<span class="tag">' + esc(tr.auth.type) + ' auth</span>';
            if (tr.auth.description) {
              html += '<span>' + esc(tr.auth.description) + '</span>';
            }
          }
        }
        html += '</div>';
      }

      var links = [];
      if (info.repository && safeUrl(info.repository)) {
        links.push('<a href="' + esc(info.repository) + '">Repository</a>');
      }
      if (info.serverUrl && safeUrl(info.serverUrl)) {
        links.push('<a href="' + esc(info.serverUrl) + '">Server URL</a>');
      }
      if (info.license) {
        links.push('<span>License: ' + esc(info.license) + '</span>');
      }
      if (links.length > 0) {
        html += '<div class="meta-links">' + links.join("") + '</div>';
      }

      html += '</div>';
      return html;
    }

    function renderTabs(toolCount, resourceCount, promptCount) {
      return '<div class="section-tabs" role="tablist" aria-label="Server capabilities">' +
        '<div class="section-tab active" role="tab" tabindex="0" aria-selected="true" data-section="tools-section">Tools <span class="count">(' + toolCount + ')</span></div>' +
        '<div class="section-tab" role="tab" tabindex="0" aria-selected="false" data-section="resources-section">Resources <span class="count">(' + resourceCount + ')</span></div>' +
        '<div class="section-tab" role="tab" tabindex="0" aria-selected="false" data-section="prompts-section">Prompts <span class="count">(' + promptCount + ')</span></div>' +
        '</div>';
    }

    function renderBadges(annotations) {
      if (!annotations) return '<div class="badges"></div>';
      var html = '<div class="badges">';
      if (annotations.readOnlyHint) html += '<span class="badge badge-readonly">readOnly</span>';
      if (annotations.destructiveHint) html += '<span class="badge badge-destructive">destructive</span>';
      if (annotations.idempotentHint) html += '<span class="badge badge-idempotent">idempotent</span>';
      if (annotations.openWorldHint) html += '<span class="badge badge-openworld">openWorld</span>';
      html += '</div>';
      return html;
    }

    function renderParams(schema) {
      var props = schema.properties || {};
      var required = schema.required || [];
      var keys = Object.keys(props);
      if (keys.length === 0) return '';

      var html = '<div class="params-section"><h4>Parameters</h4>';
      for (var i = 0; i < keys.length; i++) {
        var name = keys[i];
        var p = props[name];
        var isRequired = required.indexOf(name) !== -1;
        html += '<div class="param-row">';
        html += '<div class="param-name">' + esc(name);
        if (isRequired) html += ' <span class="param-required">required</span>';
        html += '</div>';
        html += '<div class="param-type">' + esc(p.type || "any") + '</div>';
        html += '<div class="param-desc">' + esc(p.description || "");
        if (p["default"] !== undefined) {
          html += ' <span class="param-constraint">default: ' + esc(String(p["default"])) + '</span>';
        }
        if (p.maximum !== undefined) {
          html += ' <span class="param-constraint">max: ' + esc(String(p.maximum)) + '</span>';
        }
        if (p.minimum !== undefined) {
          html += ' <span class="param-constraint">min: ' + esc(String(p.minimum)) + '</span>';
        }
        if (p["enum"]) {
          html += ' <span class="param-constraint">enum: ' + esc(p["enum"].join(" | ")) + '</span>';
        }
        html += '</div></div>';
      }
      html += '</div>';
      return html;
    }

    function renderOutputSchema(schema) {
      var json = JSON.stringify(schema, null, 2);
      return '<div class="output-schema-section">' +
        '<div class="params-section"><h4>Response Schema</h4></div>' +
        '<div class="example-code"><pre>' + esc(json) + '</pre></div>' +
        '</div>';
    }

    function renderExamples(examples) {
      if (!examples || examples.length === 0) return '';
      var html = '<div class="example-section"><div class="params-section"><h4>Examples</h4></div>';
      for (var i = 0; i < examples.length; i++) {
        var ex = examples[i];
        var json = JSON.stringify(ex.input, null, 2);
        html += '<div class="example-title">' + esc(ex.title) + '</div>';
        if (ex.description) {
          html += '<div class="example-desc">' + esc(ex.description) + '</div>';
        }
        html += '<div class="example-code">';
        html += '<pre>' + esc(json) + '</pre>';
        html += '<button class="copy-btn" onclick="copyFromCode(this)" aria-label="Copy example to clipboard">' + iconCopy() + ' copy</button>';
        html += '</div>';
      }
      html += '</div>';
      return html;
    }

    function renderToolCard(tool) {
      var html = '<div class="tool-card">';
      html += '<div class="tool-card-header" role="button" tabindex="0" aria-expanded="false" onclick="toggleTool(this)">';
      html += '<div class="tool-card-left">';
      html += '<span class="tool-name">' + esc(tool.name) + '</span>';
      if (tool.title) {
        html += '<span class="tool-title">' + esc(tool.title) + '</span>';
      }
      html += '</div>';
      html += renderBadges(tool.annotations);
      html += '</div>';

      html += '<div class="tool-detail">';
      if (tool.description) {
        html += '<div class="tool-description">' + esc(tool.description) + '</div>';
      }
      if (tool.inputSchema && tool.inputSchema.properties) {
        html += renderParams(tool.inputSchema);
      }
      if (tool.outputSchema) {
        html += renderOutputSchema(tool.outputSchema);
      }
      if (tool.examples && tool.examples.length > 0) {
        html += renderExamples(tool.examples);
      }
      html += '</div></div>';
      return html;
    }

    function renderToolsSection(tools) {
      if (!tools || tools.length === 0) {
        return '<div id="tools-section" class="section-content active" role="tabpanel" aria-label="Tools">' +
          '<div class="empty-state">No tools registered.</div></div>';
      }

      var groups = groupTools(tools);
      var groupNames = Object.keys(groups);
      var html = '<div id="tools-section" class="section-content active" role="tabpanel" aria-label="Tools">';

      for (var g = 0; g < groupNames.length; g++) {
        var groupName = groupNames[g];
        var groupToolList = groups[groupName];
        var toolWord = groupToolList.length === 1 ? "tool" : "tools";

        html += '<div class="tool-group">';
        html += '<div class="tool-group-header open" role="button" tabindex="0" aria-expanded="true" onclick="toggleGroup(this)">';
        html += '<span class="chevron">' + iconChevron() + '</span> ' + esc(groupName);
        html += '<span class="group-count">' + groupToolList.length + ' ' + toolWord + '</span>';
        html += '</div>';
        html += '<div class="tool-group-body open">';
        for (var t = 0; t < groupToolList.length; t++) {
          html += renderToolCard(groupToolList[t]);
        }
        html += '</div></div>';
      }

      html += '</div>';
      return html;
    }

    function renderResourcesSection(resources) {
      var html = '<div id="resources-section" class="section-content" role="tabpanel" aria-label="Resources">';
      if (!resources || resources.length === 0) {
        return html + '<div class="empty-state">No resources registered.</div></div>';
      }
      for (var i = 0; i < resources.length; i++) {
        var r = resources[i];
        html += '<div class="resource-card">';
        html += '<div class="resource-uri">' + esc(r.uri) + '</div>';
        if (r.name) {
          html += '<div class="resource-name">' + esc(r.name);
          if (r.mimeType) {
            html += '<span class="resource-mime">' + esc(r.mimeType) + '</span>';
          }
          html += '</div>';
        }
        if (r.description) {
          html += '<div class="resource-desc">' + esc(r.description) + '</div>';
        }
        html += '</div>';
      }
      html += '</div>';
      return html;
    }

    function renderPromptArgs(args) {
      if (!args || args.length === 0) return '';
      var html = '<div class="params-section" style="margin-top:8px"><h4>Arguments</h4>';
      for (var i = 0; i < args.length; i++) {
        var arg = args[i];
        html += '<div class="param-row">';
        html += '<div class="param-name">' + esc(arg.name);
        if (arg.required) html += ' <span class="param-required">required</span>';
        html += '</div>';
        html += '<div class="param-type">string</div>';
        html += '<div class="param-desc">' + esc(arg.description || "") + '</div>';
        html += '</div>';
      }
      html += '</div>';
      return html;
    }

    function renderPromptsSection(prompts) {
      var html = '<div id="prompts-section" class="section-content" role="tabpanel" aria-label="Prompts">';
      if (!prompts || prompts.length === 0) {
        return html + '<div class="empty-state">No prompts registered.</div></div>';
      }
      for (var i = 0; i < prompts.length; i++) {
        var p = prompts[i];
        html += '<div class="prompt-card">';
        html += '<div class="prompt-name">' + esc(p.name) + '</div>';
        if (p.description) {
          html += '<div class="prompt-desc">' + esc(p.description) + '</div>';
        }
        if (p.arguments && p.arguments.length > 0) {
          html += renderPromptArgs(p.arguments);
        }
        html += '</div>';
      }
      html += '</div>';
      return html;
    }

    function renderFooter(spec) {
      var now = new Date().toISOString().split("T")[0];
      var html = '<div class="footer">';
      html += '<span>Powered by <a href="https://mcpspec.dev">mcpspec</a> v' + esc(spec.mcpspec || "0.1.0") + '</span>';
      html += '<span>Generated ' + now + '</span>';
      html += '</div>';
      return html;
    }

    function render() {
      var app = document.getElementById("app");
      if (!spec) {
        app.innerHTML = '<div class="empty-state">No spec data available.</div>';
        return;
      }

      var tools = spec.tools || [];
      var resources = spec.resources || [];
      var prompts = spec.prompts || [];

      app.innerHTML =
        renderHeader(spec) +
        '<div id="main-content"></div>' +
        renderTabs(tools.length, resources.length, prompts.length) +
        renderToolsSection(tools) +
        renderResourcesSection(resources) +
        renderPromptsSection(prompts) +
        renderFooter(spec);
    }

    render();
  </script>
</body>
</html>
